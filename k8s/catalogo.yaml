apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogo
  labels: { app: catalogo }
spec:
  replicas: 2                    # HA basica: si muere un pod, queda otro sirviendo.
  selector:
    matchLabels: { app: catalogo }
  template:
    metadata:
      labels: { app: catalogo }
    spec:
      containers:
        - name: catalogo
          image: mpi/catalogo:v1
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 50051 }
          resources:             # F-08 del TP1: limites explicitos.
            requests: { memory: "64Mi",  cpu: "50m"  }
            limits:   { memory: "128Mi", cpu: "300m" }
          livenessProbe:         # solo chequea proceso (puerto abierto)
            tcpSocket: { port: 50051 }
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:        # mismo chequeo aca porque no tiene deps externas
            tcpSocket: { port: 50051 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: catalogo                 # este nombre es el DNS dentro del cluster
spec:
  type: ClusterIP
  selector: { app: catalogo }
  ports:
    - { port: 50051, targetPort: 50051 }
