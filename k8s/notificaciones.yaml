apiVersion: apps/v1
kind: Deployment
metadata:
  name: notificaciones
  labels: { app: notificaciones }
spec:
  replicas: 1                    # con prefetch=1 escala agregando replicas.
  selector:
    matchLabels: { app: notificaciones }
  template:
    metadata:
      labels: { app: notificaciones }
    spec:
      containers:
        - name: notificaciones
          image: mpi/notificaciones:v1
          imagePullPolicy: IfNotPresent
          env:
            - name: RABBIT_URL
              value: "amqp://guest:guest@rabbitmq:5672/"
          resources:
            requests: { memory: "64Mi",  cpu: "50m"  }
            limits:   { memory: "128Mi", cpu: "300m" }
          # No expone puerto: usamos exec para liveness.
          livenessProbe:
            exec:
              command: ["python", "-c", "import pika"]
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
# Sin Service: notificaciones es un consumer puro, no atiende requests.
